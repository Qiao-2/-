<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会员专属个人站</title>
    <meta name="theme-color" content="#f6d9e2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="page">
      <section class="top-card">
        <div class="title-block">
          <h1>会员专属个人站</h1>
          <p>请勿外传</p>
        </div>

        <div class="warn-pill">为了能够长久，请别外传，别炫耀，一经发现，将关停网站</div>

        <button class="admin-tab" id="unlockAdminBtn" type="button">后台</button>
      </section>

      <section class="search-shell">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="实时搜索作者 / 书名 / 链接" autocomplete="off" />
        </div>
        <div class="search-actions">
          <button id="searchBtn" type="button">搜索番茄</button>
        </div>
        <p id="searchStatus" class="search-status">输入书名开始搜索番茄小说</p>
      </section>

      <section id="bookList" class="results-shell"></section>

      <section id="admin" class="admin-shell hidden">
        <div class="admin-locked" id="adminLocked">
          <p>后台已锁定。请输入密码后即可解锁。</p>
        </div>

        <dialog id="passwordDialog" class="pwd-dialog">
          <div class="pwd-card">
            <p>请输入后台密码</p>
            <div class="pwd-row">
              <input id="dialogPasswordInput" type="password" placeholder="请输入密码" />
              <button id="dialogSubmitBtn" type="button">确认</button>
              <button id="dialogCancelBtn" type="button">取消</button>
            </div>
          </div>
        </dialog>

        <div id="adminPanel" class="admin-panel hidden">
          <div class="panel-head">
            <h2>后台</h2>
            <button id="lockAdminBtn" type="button">锁定</button>
          </div>

          <div class="admin-block">
            <div class="grid-2">
              <input id="newTitle" placeholder="书名" />
              <input id="newAuthor" placeholder="作者" />
              <input id="newResourceUrl" placeholder="链接" />
              <input id="newResourceLabel" placeholder="按钮文字" />
            </div>
            <div class="actions">
              <button id="addBookBtn" type="button">添加</button>
              <button id="saveJsonBtn" type="button">保存</button>
              <button id="downloadJsonBtn" type="button">导出 JSON</button>
            </div>
          </div>

          <div class="admin-block">
            <div class="panel-head small">
              <h3>资源列表</h3>
              <div class="actions right">
                <button id="selectAllAdminBtn" type="button">全选</button>
                <button id="clearSelectionBtn" type="button">清空</button>
                <button id="deleteSelectedBtn" type="button">删除</button>
              </div>
            </div>
            <div id="adminBookList" class="results-shell"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">仅用于合法内容展示与下载。</footer>
    <script src="script.js"></script>
  </body>
</html>
