<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会员专属个人站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero-card">
        <div class="hero-copy">
          <h1 id="siteHeroTitle">会员专属个人站</h1>
          <p id="siteHeroDesc">请勿外传</p>
        </div>
        <button class="admin-btn" id="unlockAdminBtn" type="button">后台</button>
      </section>

      <section class="search-card">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="作者 / 书名" />
          <button id="searchBtn" type="button">搜索</button>
        </div>
      </section>

      <section id="bookList" class="results"></section>

      <section class="admin-wrap hidden" id="admin">
        <div class="admin-locked" id="adminLocked">
          <p>后台已锁定。输入密码后即可解锁并显示在页面下方。</p>
          <div class="password-row">
            <input id="adminPasswordInput" type="password" placeholder="请输入后台密码" />
            <button id="submitAdminPasswordBtn" type="button">解锁后台</button>
          </div>
        </div>

        <div id="adminPanel" class="hidden admin-panel">
          <div class="admin-block">
            <h3>快速编辑</h3>
            <div class="grid-2">
              <input id="newTitle" placeholder="书名" />
              <input id="newAuthor" placeholder="作者" />
              <input id="newResourceUrl" placeholder="蓝奏云链接填写" />
              <input id="newResourceLabel" placeholder="按钮文字" />
            </div>
            <div class="actions">
              <button id="addBookBtn" type="button">添加</button>
              <button id="saveJsonBtn" type="button">保存</button>
              <button id="downloadJsonBtn" type="button">导出 JSON</button>
            </div>
          </div>

          <div class="admin-block">
            <h3>批量管理</h3>
            <div class="actions">
              <button id="selectAllAdminBtn" type="button">全选</button>
              <button id="clearSelectionBtn" type="button">清空</button>
              <button id="deleteSelectedBtn" type="button">删除</button>
            </div>
            <div id="adminBookList" class="results"></div>
          </div>
        </div>
      </section>
    </main>

    <dialog id="passwordDialog" class="password-dialog">
      <div class="password-card">
        <h3>后台解锁</h3>
        <p>请输入密码后继续。</p>
        <input id="dialogPasswordInput" type="password" placeholder="请输入后台密码" />
        <div class="actions right">
          <button id="dialogCancelBtn" type="button">取消</button>
          <button id="dialogSubmitBtn" type="button">确认</button>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
